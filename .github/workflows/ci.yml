name: SAO CI (OPTIONAL)

# Account may lack Actions minutes (billing lock). Local doctor is the real gate:
#   python scripts/doctor.py --fresh
# This workflow is best-effort only — never required.

on:
  workflow_dispatch:  # manual only when runners work
  # push/PR disabled so failed billing does not spam "job not started"

jobs:
  fresh-device:
    name: Fresh device sim (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          python -m py_compile cli.py
          python -m py_compile scripts/doctor.py
          python -m py_compile scripts/subconscious.py
          python -m py_compile scripts/ingest.py
        shell: bash

      - name: Package structure
        run: |
          test -f bin/sao.js
          test -f package.json
          test -f templates/vault/AGENTS.md
          test -f templates/vault/.graphignore
        shell: bash

      - name: Doctor — fresh device simulation
        run: python scripts/doctor.py --fresh
        shell: bash
